name: Deploy Brand Site (CI/CD)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PII guard: fail the build if any public artifact leaks name/birthdate patterns.
      - name: PII guard
        run: |
          if grep -rniE "ken851004|851004|1985-10-04|chan tak kin|KEN851004" site/; then
            echo "::error::PII detected in public site — aborting deploy"
            exit 1
          fi
          echo "PII guard passed"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
